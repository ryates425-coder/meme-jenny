<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Meme Generator</h1>
        
        <section class="controls">
            <div class="upload-section">
                <label for="image-upload" class="upload-label">Choose Image</label>
                <input type="file" id="image-upload" accept="image/*">
                <span class="suggestion-status" id="suggestion-status"></span>
            </div>

            <button type="button" id="suggest-again-btn" class="suggest-again-btn" disabled>Suggest again</button>

            <div class="text-inputs">
                <label for="top-text">Top Text</label>
                <textarea id="top-text" rows="2" placeholder="Enter top text..."></textarea>
                <label for="bottom-text">Bottom Text</label>
                <textarea id="bottom-text" rows="2" placeholder="Enter bottom text..."></textarea>
            </div>

            <div class="font-size-control">
                <label for="font-size">Font Size: <span id="font-size-value">48</span>px</label>
                <input type="range" id="font-size" min="16" max="120" value="48">
            </div>

            <div class="text-color-control">
                <label>Text Color</label>
                <div class="color-blocks" id="color-blocks">
                    <button type="button" class="color-block selected" data-color="#ffffff" style="background-color:#ffffff" title="White"></button>
                    <button type="button" class="color-block" data-color="#ffff00" style="background-color:#ffff00" title="Yellow"></button>
                    <button type="button" class="color-block" data-color="#ff0000" style="background-color:#ff0000" title="Red"></button>
                    <button type="button" class="color-block" data-color="#ff6600" style="background-color:#ff6600" title="Orange"></button>
                    <button type="button" class="color-block" data-color="#00ff00" style="background-color:#00ff00" title="Green"></button>
                    <button type="button" class="color-block" data-color="#00ffff" style="background-color:#00ffff" title="Cyan"></button>
                    <button type="button" class="color-block" data-color="#0066ff" style="background-color:#0066ff" title="Blue"></button>
                    <button type="button" class="color-block" data-color="#ff00ff" style="background-color:#ff00ff" title="Magenta"></button>
                </div>
            </div>

            <button type="button" id="download-btn" disabled>Download Meme</button>
        </section>

        <section class="preview-section">
            <canvas id="meme-canvas"></canvas>
            <p class="placeholder" id="placeholder">Upload an image to get started</p>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
